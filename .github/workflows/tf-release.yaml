name: Terraform release

# On PRs touching .tf files: verify terraform/VERSION was bumped and is valid semver.
# On merge to main: tag the repo with the version from terraform/VERSION.
# The version is stored in terraform/VERSION as a plain semver string (e.g. 2.1.0).

on:
  pull_request:
    paths:
      - "**/*.tf"
  push:
    branches:
      - main
    paths:
      - "terraform/VERSION"

env:
  SEMVER_RE: '^(?P<major>0|[1-9]\d*)\.(?P<minor>0|[1-9]\d*)\.(?P<patch>0|[1-9]\d*)(?:-(?P<prerelease>(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+(?P<buildmetadata>[0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'

jobs:
  terraform-release:
    name: Tag TF release
    uses: canonical/observability/.github/workflows/tf-release.yaml@feat/tf-tagging-ci
    with:
      event: ${{ github.event_name }}
    secrets: inherit
